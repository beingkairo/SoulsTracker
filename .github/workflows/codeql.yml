name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze C#
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: csharp
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.301
      - run: dotnet restore SoulsTracker.sln --locked-mode
      - run: dotnet build SoulsTracker.sln --configuration Release --no-restore
      - uses: github/codeql-action/analyze@v3
