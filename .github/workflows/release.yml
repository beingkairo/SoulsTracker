name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write
  attestations: write
  id-token: write

jobs:
  package:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.301

      - uses: actions/setup-node@v4
        with:
          node-version-file: web_overlay/.nvmrc
          cache: npm
          cache-dependency-path: web_overlay/package-lock.json

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress --yes

      - name: Build and test release candidate
        shell: pwsh
        run: ./scripts/Build-Release.ps1

      - name: Create portable archive and checksums
        shell: pwsh
        run: |
          $release = 'artifacts/desktop'
          Compress-Archive -Path "$release/*" -DestinationPath 'artifacts/SoulsTrackerV1.0-portable.zip' -Force
          Get-FileHash 'installer/Output/SoulsTrackerV1.0.exe', 'artifacts/SoulsTrackerV1.0-portable.zip' -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash.ToLowerInvariant())  $($_.Path | Split-Path -Leaf)" } |
            Set-Content -Encoding ascii 'artifacts/SHA256SUMS.txt'

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: artifacts/SoulsTrackerV1.0.sbom.spdx.json

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            installer/Output/SoulsTrackerV1.0.exe
            artifacts/SoulsTrackerV1.0-portable.zip
            artifacts/SHA256SUMS.txt
            artifacts/SoulsTrackerV1.0.sbom.spdx.json

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            installer/Output/SoulsTrackerV1.0.exe
            artifacts/SoulsTrackerV1.0-portable.zip
            artifacts/SHA256SUMS.txt
            artifacts/SoulsTrackerV1.0.sbom.spdx.json

      - name: Append setup guide to release notes
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $release = gh api "repos/$env:GITHUB_REPOSITORY/releases/tags/$env:GITHUB_REF_NAME" | ConvertFrom-Json
          $guide = Get-Content -Raw -Encoding utf8 'docs/RELEASE-GETTING-STARTED.md'
          $existingNotes = if ($null -eq $release.body) { "" } else { $release.body.TrimEnd() }
          $notes = "$existingNotes`n`n$($guide.Trim())"
          gh api --method PATCH "repos/$env:GITHUB_REPOSITORY/releases/$($release.id)" -f "body=$notes"
